name: deploy-prod

# Auto-deploy the hosted "exhibit" to the CPU VPS on every push to main.
#
# One-time setup:
#   1. Repo -> Settings -> Secrets and variables -> Actions -> add:
#        VPS_HOST     the VPS IP (or domain)
#        VPS_USER     the SSH user (e.g. root, or a deploy user in the docker group)
#        VPS_SSH_KEY  a PRIVATE key dedicated to CI (its PUBLIC half goes in the
#                     VPS user's ~/.ssh/authorized_keys)
#        VPS_PORT     (optional) SSH port, defaults to 22
#   2. Bootstrap the VPS ONCE: clone into ~/immovable-object-part-1, write .env,
#      and run the first `docker compose -f docker-compose.prod.yml up -d --build`.
#
# After that, each push to main rebuilds + restarts the stack on the box. Repo
# secrets are never exposed to fork pull requests -- this runs only on push to
# main and manual dispatch, both of which require write access.
#
# NOTE: `caddy reload` applies Caddyfile edits with zero downtime, but does NOT
# provision a cert for a brand-NEW domain. If you add a domain to the Caddyfile,
# run `docker compose -f docker-compose.prod.yml restart caddy` on the VPS once
# (a fresh start reliably obtains the new cert; it then persists in the volume).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      attempt:
        description: "auto-retry counter (set by the workflow itself)"
        required: false
        default: "1"

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never interrupt a build/deploy midway

# Hostinger's edge drops SOME Azure IP ranges (live finding 2026-07-17: uptime
# probes consistently blocked, deploys usually fine — runner IP roulette). When
# the SSH connect times out, the job below re-dispatches itself so a FRESH
# runner (fresh IP) retries, up to 3 attempts, and pings the operator's
# Telegram when it retries or gives up. Always deploys origin/main HEAD, so a
# retried run can never ship stale code.
permissions:
  actions: write               # lets the failure step re-dispatch this workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (pull + rebuild on the VPS)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error::VPS_HOST not set. Add VPS_HOST / VPS_USER / VPS_SSH_KEY in Settings -> Secrets -> Actions, then re-run."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "$VPS_USER@$VPS_HOST" \
            'set -e; cd ~/immovable-object-part-1; git fetch --all --prune; git reset --hard origin/main; docker compose -f docker-compose.prod.yml up -d --build; docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || echo "WARN: caddy reload failed (Caddyfile change not applied)"; docker image prune -f; docker compose -f docker-compose.prod.yml ps'

      - name: Retry from a fresh runner on failure (new IP), alert on give-up
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ATTEMPT: ${{ github.event.inputs.attempt || '1' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          alert() {
            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
              curl -sS -m 15 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode text="$1" > /dev/null || true
            fi
          }
          if [ "$ATTEMPT" -lt 3 ]; then
            echo "deploy attempt $ATTEMPT failed — re-dispatching from a fresh runner"
            alert "⚠️ prod deploy attempt $ATTEMPT failed (likely a blocked runner IP) — retrying from a fresh runner"
            gh workflow run deploy-prod -R "${{ github.repository }}" -f attempt=$((ATTEMPT + 1))
          else
            alert "🔴 prod deploy FAILED after $ATTEMPT attempts — main is NOT deployed. Check the Actions tab."
          fi
