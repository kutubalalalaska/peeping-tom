# Full end-to-end DEV test: native Ollama vision (Metal) + the REAL Route A read
# (GLM-5.2 via OpenRouter). The assembled TEXT transcript IS sent to GLM under ZDR;
# raw media still never leaves (decoded locally). Exercises the full two-pass loop:
# 3B cheap-all -> GLM read#1 (+ image picks) -> 7B deep on picks -> GLM re-read#2.
#
# This is the only compose that does native decode AND a real read — the others:
#   docker-compose.yml          ship (containerized Ollama, slow on Mac)
#   docker-compose.mock.yml     all-mock, zero deps
#   docker-compose.hostdecode   native decode + MOCK read (decode-speed / UI work)
#   docker-compose.routeA       MOCK decode + real read (read/UI without Ollama)
#
# Prereqs (one-time):
#   ollama pull qwen2.5vl:3b      # the cheap-all model (you already have :7b)
#   .env must have ROUTE_A_* set  # your OpenRouter key (already configured + verified)
#
# Run:
#   docker compose -f docker-compose.hostdecode.yml down       # stop the decode-only stack
#   docker compose -f docker-compose.fulltest.yml up --build   # build + run (foreground = live logs)
#   open http://localhost:8000
#
# DEV-ONLY (native Ollama via host.docker.internal). Loaded only via explicit -f,
# so it can never affect the shipped `docker compose up` (containerized Ollama).
services:
  app:
    build: .
    env_file: .env                                    # brings ROUTE_A_* -> REAL GLM-5.2 read (ZDR on)
    environment:
      VISION_BACKEND: ollama
      OLLAMA_HOST: http://host.docker.internal:11434  # host's native Ollama (Metal)
      VISION_MODEL: qwen2.5vl:7b                       # DEEP pass (GLM-picked images)
      VISION_MODEL_FAST: qwen2.5vl:3b                  # CHEAP-ALL pass — REQUIRES the pull above
      DECODE_MAX_PX_FAST: "768"
      WHISPER_MODEL: base
      EPHEMERAL: "0"                                    # keep artifacts so we can inspect the test
      DATA_DIR: /data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mirror-data:/data
    ports:
      - "8000:8000"

volumes:
  mirror-data:
