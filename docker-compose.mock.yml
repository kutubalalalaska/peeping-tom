# Quick flow test — no Ollama, no frontier endpoint, no model downloads.
# Builds the image (frontend + backend) and runs the app alone with everything mocked.
#
#   docker compose -f docker-compose.mock.yml up --build
#   open http://localhost:8000
#
services:
  app:
    build: .
    environment:
      VISION_BACKEND: mock          # media "classification" without Ollama
      FRONTIER_PROVIDER: mock        # templated read without an endpoint
      DATA_DIR: /data
    volumes:
      - mirror-data:/data
    ports:
      - "8000:8000"

volumes:
  mirror-data:
