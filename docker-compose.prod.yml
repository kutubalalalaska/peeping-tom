# PRODUCTION — the hosted "exhibit" tier on a CPU VPS, behind HTTPS.
#
#   Caddy (:80/:443, auto-TLS)  ->  app (:8000)  ->  ollama (CPU vision)
#                                      |
#                                      +-- read = GLM-5.2 via OpenRouter (ROUTE_A_*, ZDR)
#
# Privacy/safety posture baked in here (all map to real code — no theatre):
#   - HOSTED=1            consent gate + rate moat + fail-closed NSFW gate
#   - EPHEMERAL=0         keep artifacts so the read + receipts work UNTIL...
#   - self-destruct       ...the read auto-deletes READ_TTL_SECONDS after it's ready
#                         (countdown on the result page); abandoned jobs swept too
#   - COOKIE_SECURE=1     the session cookie is Secure (we're behind Caddy TLS)
#
# All decode tuning lives in DECODE_PROFILE=cpu (mirror/config.py): the 3B vision
# model for both passes, small images, 2 workers, generous timeouts, VLM warm all
# day, tiered-ASR caps sized for CPU. Needs ~8GB RAM.
#
# One-time:
#   cp .env.example .env      # set ROUTE_A_API_KEY, DOMAIN, ACME_EMAIL
#   # point DOMAIN's DNS A-record at this VPS; open ports 80 + 443
# Run:
#   docker compose -f docker-compose.prod.yml up -d --build
#   # first boot pulls qwen2.5vl:3b (a few minutes) — watch: docker compose -f docker-compose.prod.yml logs -f
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30          # first run downloads the model — give it room

  app:
    build: .
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file: .env          # ROUTE_A_* (the read) — never committed
    environment:
      DECODE_PROFILE: cpu                 # ALL decode tuning (models/px/workers/ASR caps)
      # Neutralize tuning leftovers a VPS .env may carry from the old .env.example —
      # empty means "the profile decides" (config.py falls through on "").
      VISION_MODEL: ""
      WHISPER_MODEL: ""
      DECODE_WORKERS: ""
      READ_STREAM_REASONING: "1"          # stream GLM-5.2's real chain-of-thought (probe-confirmed 2026-07-08)
      # --- hosted tier: consent + self-destruct + abuse moat ---
      HOSTED: "1"
      EPHEMERAL: "0"
      COOKIE_SECURE: "1"
      READ_TTL_SECONDS: "1200"            # read self-destructs 20 min after it's ready
      MAX_JOB_AGE_SECONDS: "21600"        # garbage backstop (6h) — the sweeper never kills a heartbeating job
      PURGE_INTERVAL_SECONDS: "120"
      RATE_MAX_PER_SESSION: "5"
      RATE_MAX_PER_IP: "20"
      RATE_WINDOW_SECONDS: "86400"
    volumes:
      - mirror-data:/data
      # Whisper models download from HF on first use (base ~150MB, the tiered-ASR
      # escalation model large-v3-turbo ~1.6GB) — persist across recreates/updates.
      - whisper-cache:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8000:8000"             # localhost-only (for debugging on the VPS); Caddy serves the world

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  ollama-models:
  whisper-cache:
  mirror-data:
  caddy-data:
  caddy-config:
