# Full-flow test of Route A (managed API / OpenRouter) with NO Ollama.
# Media decode is mocked; the READ is real, through your configured ROUTE_A_*.
#
#   cp .env.example .env        # fill ROUTE_A_API_KEY (+ pick ROUTE_A_MODEL)
#   docker compose -f docker-compose.routeA.yml up --build
#   open http://localhost:8000  — upload a chat, get a REAL read from OpenRouter
#
# (If .env also defines ROUTE_B_*, the UI shows the route picker; with only
#  Route A configured it just uses Route A — no picker.)
services:
  app:
    build: .
    env_file: .env                 # brings in ROUTE_A_* (and ROUTE_B_* if set)
    environment:
      VISION_BACKEND: mock          # no Ollama — mock the local decode
      DATA_DIR: /data
      HOSTED: "1"                   # exercise the hosted-tier flow (consent etc.)
    volumes:
      - mirror-data:/data
    ports:
      - "8000:8000"

volumes:
  mirror-data:
