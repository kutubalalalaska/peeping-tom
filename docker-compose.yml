services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama          # persists pulled models across runs
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    # GPU note: on Linux+NVIDIA, uncomment to accelerate local decode.
    # deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  app:
    build: .
    depends_on:
      ollama:
        condition: service_started
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      DATA_DIR: /data
    volumes:
      - mirror-data:/data                     # jobs, transcripts, reads
    ports:
      - "8000:8000"

volumes:
  ollama-models:
  mirror-data:
